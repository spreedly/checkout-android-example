name: Build Verification

on:
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  gradle-verify:
    name: Gradle assemble, unit tests, and lint
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GITHUB_USERNAME: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Gradle verify
        run: ./gradlew :app:assembleDevelopmentDebug :app:testDevelopmentDebugUnitTest :app:lintDevelopmentDebug --no-daemon
