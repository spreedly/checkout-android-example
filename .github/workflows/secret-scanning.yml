name: Secret Scanning

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  GITLEAKS_VERSION: 8.18.1

jobs:
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_DIR="${RUNNER_TEMP}/gitleaks"
          mkdir -p "${GITLEAKS_DIR}"
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -O "${GITLEAKS_DIR}/gitleaks.tar.gz"
          tar -xzf "${GITLEAKS_DIR}/gitleaks.tar.gz" -C "${GITLEAKS_DIR}"
          chmod +x "${GITLEAKS_DIR}/gitleaks"

          # Scan repo only — do not extract the gitleaks tarball in $GITHUB_WORKSPACE (its README.md contains example secrets).
          "${GITLEAKS_DIR}/gitleaks" detect \
            --source . \
            --no-git \
            --gitleaks-ignore-path .gitleaksignore \
            --verbose || EXIT_CODE=$?

          if [ "${EXIT_CODE:-0}" -ne 0 ]; then
            echo "::error::Gitleaks detected potential secrets. Review findings above."
            exit 1
          fi

          echo "No secrets detected."
